emit:
  - "@azure-tools/typespec-ts"
options:
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{project-root}/generated/typespec-ts"
    title: Azure Load Testing
    description: Azure Load Testing Client
    azure-sdk-for-js: false
    enable-operation-group: true
    hierarchy-client: false
    experimental-extensible-enums: true
    experimental-subpath: true
    experimental-merge-strategy: "merge"
    generate-metadata: true
    flavor: azure
    package-details:
      name: "@azure/load-testing-experimental"
      description: This package contains Microsoft Azure LoadTestingClient client library with experimental subpath.
      version: 1.0.0
