name: Weekly Spector Coverage Report

on:
  schedule:
    # Every Monday at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  spector-coverage-report:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install
        timeout-minutes: 15

      - name: Build
        run: pnpm build
        timeout-minutes: 20

      - name: Copy TypeSpec specs
        working-directory: packages/typespec-ts
        run: npm run copy:typespec

      - name: Run azure-modular integration tests
        working-directory: packages/typespec-ts
        run: npm run integration-test-ci:azure-modular
        timeout-minutes: 60

      - name: Create coverage report issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const coveragePath = path.join(
              process.env.GITHUB_WORKSPACE,
              'packages/typespec-ts/coverage/spector-coverage-typescript-modular-azure.json'
            );
            const data = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));

            const today = new Date().toISOString().split('T')[0];
            let body = `# Spector Coverage Report — ${today}\n\n`;
            body += `> Auto-generated by the **Weekly Spector Coverage Report** workflow.\n\n`;

            body += `## Summary\n\n`;
            body += `| Package | Version | Total | ✅ Pass | 🔲 Not Implemented | Coverage |\n`;
            body += `|---------|---------|------:|--------:|--------------------:|---------:|\n`;

            let allNotImplemented = [];

            for (const entry of data) {
              const { packageName, version } = entry.scenariosMetadata;
              const results = entry.results;
              const scenarios = Object.entries(results);
              const total = scenarios.length;
              const pass = scenarios.filter(([, s]) => s === 'pass').length;
              const notImpl = scenarios.filter(([, s]) => s === 'not-implemented').length;
              const pct = total > 0 ? ((pass / total) * 100).toFixed(1) : '0.0';

              body += `| \`${packageName}\` | ${version} | ${total} | ${pass} | ${notImpl} | ${pct}% |\n`;

              const notImplScenarios = scenarios
                .filter(([, s]) => s === 'not-implemented')
                .map(([name]) => ({ name, package: packageName }));
              allNotImplemented.push(...notImplScenarios);
            }

            body += `\n## Not-Implemented Scenarios (${allNotImplemented.length})\n\n`;

            if (allNotImplemented.length === 0) {
              body += `🎉 All scenarios are implemented!\n`;
            } else {
              const grouped = {};
              for (const item of allNotImplemented) {
                if (!grouped[item.package]) grouped[item.package] = [];
                grouped[item.package].push(item.name);
              }

              for (const [pkg, scenarios] of Object.entries(grouped)) {
                body += `### \`${pkg}\` (${scenarios.length} not implemented)\n\n`;
                for (const name of scenarios.sort()) {
                  body += `- [ ] \`${name}\`\n`;
                }
                body += `\n`;
              }
            }

            await github.rest.issues.create({
              owner: 'JialinHuang803',
              repo: 'autorest.typescript',
              title: `Spector Coverage Report — ${today}`,
              body: body,
              labels: ['spector-coverage']
            });
